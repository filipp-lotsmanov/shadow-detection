# Training settings:
# - Trains on ALL annotated samples (no val holdout)
# - Fixed-epoch cosine LR schedule, no early stopping
# - 19 geometric features concatenated with the ResNet image features
batch_size: 128
num_epochs: 40
num_workers: 4

learning_rate: 3e-3
backbone_lr: 3e-4
weight_decay: 1e-4

# Cosine annealing decays the LR to this floor over num_epochs.
cosine_eta_min: 1e-6

loss_weight_side: 1.0
loss_weight_regression: 5.0
loss_weight_direction: 1.0

use_amp: true

# Random seed for torch / numpy / dataset shuffling.
seed: 42
