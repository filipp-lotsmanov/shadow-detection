# Data settings. Input images are 720 wide; the model resizes to 384x384.
img_w: 720

input_size: [384, 384]

# ImageNet-style normalization stats computed on the training set.
channel_means: [0.422, 0.413, 0.394]
channel_stds: [0.167, 0.174, 0.233]

# Probability of applying the horizontal flip (with label mirroring) per sample.
flip_prob: 0.5
